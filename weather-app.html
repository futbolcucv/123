<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <link rel="stylesheet" href="weather-styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1><i class="fas fa-cloud"></i> Weather Dashboard</h1>
            <p>Real-time weather for any location</p>
        </header>

        <section class="search-section">
            <div class="search-container">
                <input type="text" id="cityInput" class="search-input" placeholder="Enter city name...">
                <button id="searchBtn" class="search-btn"><i class="fas fa-search"></i> Search</button>
                <button id="locationBtn" class="location-btn" title="Current location"><i class="fas fa-location-dot"></i></button>
            </div>
        </section>

        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <p>Loading weather data...</p>
        </div>

        <div id="error" class="error-message hidden"></div>

        <section id="currentWeather" class="current-weather hidden">
            <div class="weather-main">
                <div class="weather-icon-container">
                    <img id="weatherIcon" src="" alt="Weather icon" class="weather-icon">
                </div>
                <div class="weather-info">
                    <h2 id="cityName"></h2>
                    <p id="weatherDescription" class="description"></p>
                    <div class="temperature-display">
                        <span id="temperature" class="temp"></span>
                        <span class="unit">°C</span>
                    </div>
                </div>
            </div>

            <div class="weather-details-grid">
                <div class="detail-card">
                    <div class="detail-icon"><i class="fas fa-droplet"></i></div>
                    <div class="detail-info">
                        <p class="detail-label">Humidity</p>
                        <p id="humidity" class="detail-value">--</p>
                    </div>
                </div>
                <div class="detail-card">
                    <div class="detail-icon"><i class="fas fa-wind"></i></div>
                    <div class="detail-info">
                        <p class="detail-label">Wind Speed</p>
                        <p id="windSpeed" class="detail-value">--</p>
                    </div>
                </div>
                <div class="detail-card">
                    <div class="detail-icon"><i class="fas fa-gauge"></i></div>
                    <div class="detail-info">
                        <p class="detail-label">Pressure</p>
                        <p id="pressure" class="detail-value">--</p>
                    </div>
                </div>
            </div>
        </section>

        <section id="forecastSection" class="forecast-section hidden">
            <h3>5-Day Forecast</h3>
            <div id="forecastContainer" class="forecast-container"></div>
        </section>

        <section id="hourlySection" class="hourly-section hidden">
            <h3>Hourly Forecast</h3>
            <div id="hourlyContainer" class="hourly-container"></div>
        </section>
    </div>

    <div class="unit-toggle">
        <button id="celsiusBtn" class="unit-btn active">°C</button>
        <button id="fahrenheitBtn" class="unit-btn">°F</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
